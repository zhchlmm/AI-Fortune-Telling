schema: spec-driven

context: |
  
  项目背景：本项目是**AI科学算命**微信小程序及后台管理系统，项目包含微信小程序、管理后台API和管理后台前端等部分。旨在为用户提供算命、占卜、风水研究、星座运势、生肖命理、八字和运势等服务，以及相关资讯展示和分享，资讯包括算命, 占卜, 命理, 风水, 八字, 文昌位, 紫微斗数, 星座, 塔罗牌, 手相, 面相, 姓名学, 生肖, 风水罗盘, 风水摆件, 风水布局, 风水学说, 风水理论, 风水实践, 风水案例, 风水文化, 风水历史, 风水发展, 风水研究, 风水学家, 风水师, 风水大师, 风水顾问, 风水专家, 风水爱好者, 风水学习等相关内容。

  语言：中文（简体）

  所有产出物文档必须用简体中文撰写。这些除外:
  - 保持技术用语使用英语，比如："API", "Restful", "GraphQL"等
  - 代码示例和文件路径使用英语
  - 其他专有名词保持原文
  
  微信小程序技术栈: TDesign, TypeScript
  管理后台API技术栈：ABP框架(最新版本), C#, .NET 10, Entity Framework Core, MySQL, Redis, JWT, Swagger, FluentValidation, Serilog, xUnit, Moq, Mapster, AutoFac, OpenAPI, SignalR, WebSocket 
  管理后台前端技术栈: TypeScript, Vue, Vite, Pinia, Tailwind CSS, Shadcn UI, Vitest, ESLint, Prettier

  系统架构：
  1.采用前后端分离，微信小程序作为前端展示和交互界面，管理后台API提供数据接口和业务逻辑处理，管理后台前端提供管理员操作界面。
  2.使用ABP模块化架构设计，遵守ABP最佳实践。
  3.采用DDD设计领域模型和业务逻辑。
  4.使用TDD模式，编写单元测试和集成测试，确保系统的健壮性和可维护性。
  5.使用Git版本控制工具进行代码管理和协作，代码提交遵守conventional commits,确保提交记录清晰和规范。

  Domain: 算命、风水、占卜、星座运势、生肖命理、八字和运势等相关领域。

